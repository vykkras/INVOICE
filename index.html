<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Manager - DC Cable</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="profile-indicator" id="profileIndicator" onclick="showProfilePicker()"></button>
        <div class="logo-section">
                <div class="logo">
                    <span class="dc">DC</span><br>
                    <span class="cable">CABLE</span><br>
                    <div class="contractor-text">AUTHORIZED CONTRACTOR</div>
                </div>
            </div>
            <div class="action-buttons invoice-actions">
                <button class="btn btn-home" onclick="goHome()">🏠 Home</button>
                <button class="btn btn-folder" type="button" onclick="goBackToFolder()">⬅ Back</button>
                <button class="btn btn-new" onclick="showNewInvoiceDropdown(this,'editor')">+ New ▾</button>
                <button class="btn btn-save" onclick="saveInvoice()">💾 Save</button>
                <button class="btn btn-template" id="saveTemplateBtn" type="button" onclick="saveAsTemplate()">Save as Template</button>
                <button class="btn btn-print" id="printBtnFresh" type="button" onclick="printInvoice()">🖨️ Print</button>
            </div>
        </div>
        <div class="invoice-banner" aria-hidden="true"></div>

        <div class="home-content" id="homeView">
            <div class="dashboard-topbar">
                <div>
                    <div class="dashboard-greeting" id="dashboardGreeting">Dashboard</div>
                    <div class="dashboard-summary" id="dashboardSummary"></div>
                </div>
                <div class="home-actions">
                    <button class="btn btn-new" onclick="showNewInvoiceDropdown(this,'home')">+ New Invoice ▾</button>
                    <button class="btn btn-save" onclick="openSavedInvoicesView()">Saved Invoices</button>
                </div>
            </div>
            <div class="dashboard-contracts" id="dashboardContracts"></div>
        </div>

        <div class="saved-view" id="savedView">
            <div class="saved-toolbar">
                <div class="saved-breadcrumbs" id="savedBreadcrumbs"></div>
                <input type="text" id="invoiceSearch" class="invoice-search" placeholder="🔍 Search invoices..." oninput="handleSearch(this.value)" autocomplete="off">
                <div class="saved-actions">
                    <button class="btn btn-new" type="button" onclick="showNewInvoiceDropdown(this,'saved')">+ New Invoice ▾</button>
                    <button class="btn btn-folder" type="button" onclick="openFolderCreator()">+ New Folder</button>
                    <button class="btn btn-print" type="button" onclick="printFolderInvoices()">🖨️ Print Folder</button>
                    <button class="btn btn-home" type="button" onclick="goHome()">🏠 Home</button>
                </div>
            </div>
            <div class="folder-create" id="folderCreate">
                <input type="text" id="folderNameInput" placeholder="Folder name">
                <button type="button" onclick="submitFolderCreate()">Create</button>
                <button type="button" class="secondary" onclick="cancelFolderCreate()">Cancel</button>
            </div>
            <div class="undo-bar" id="undoBar">
                <span id="undoMessage">No deletions to undo.</span>
                <button type="button" onclick="undoDelete()">Undo</button>
            </div>
            <div class="saved-list" id="savedList"></div>
        </div>

        <div class="template-name-dialog" id="templateNameDialog">
            <div class="template-name-content">
                <div class="template-name-title">Template name</div>
                <input type="text" id="templateNameInput" placeholder="e.g. Weekly Report" autocomplete="off" onkeydown="if(event.key==='Enter')confirmSaveTemplate();if(event.key==='Escape')cancelSaveTemplate();">
                <div class="template-name-actions">
                    <button type="button" class="btn btn-save" onclick="confirmSaveTemplate()">Save</button>
                    <button type="button" onclick="cancelSaveTemplate()">Cancel</button>
                </div>
            </div>
        </div>

        <div class="move-dialog" id="moveDialog">
            <div class="move-dialog-content">
                <div class="move-dialog-header">
                    <div class="move-dialog-title">Move to folder</div>
                    <button type="button" class="move-dialog-close" onclick="closeMoveDialog()">✕</button>
                </div>
                <div class="move-dialog-breadcrumbs" id="moveBreadcrumbs"></div>
                <div class="move-dialog-list" id="moveFolderList"></div>
            </div>
        </div>

        <div class="invoice-content" id="editorView">
            <!-- Invoice Header -->
            <div class="invoice-header-section">
                <div class="invoice-left">
                    <div class="invoice-title">INVOICE</div>
                    <!-- Billing Section -->
                    <div class="billing-section">
                        <div class="bill-to">
                            <div class="section-title">From</div>
                            <div class="form-group">
                                <input type="text" id="fromCompany" placeholder="Cable Services Pro">
                            </div>
                        </div>
                        <div class="bill-to">
                            <div class="section-title">Bill To</div>
                            <div class="form-group">
                                <input type="text" id="billToCompany" placeholder="Company Name (e.g., BPS)">
                            </div>
                            <div class="form-group">
                                <input type="text" id="billToAddress" placeholder="Address (optional)">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="invoice-meta">
                    <div class="meta-fields" id="metaFields"></div>
                    <button class="btn btn-add-meta" type="button" onclick="addMetaField()">+ Add Field</button>
                    <div class="balance-due">
                        <span>Balance Due:</span>
                        <span id="balanceDue">$0.00</span>
                    </div>
                </div>
            </div>

            <!-- Items Section -->
            <div class="items-section">
                <table class="items-table" id="itemsTable">
                    <thead>
                        <tr>
                            <th style="width: 45%">Item</th>
                            <th style="width: 15%">Quantity</th>
                            <th style="width: 15%">Rate</th>
                            <th style="width: 20%">Amount</th>
                            <th style="width: 5%"></th>
                        </tr>
                    </thead>
                    <tbody id="itemsBody">
                        <!-- Items will be added here -->
                    </tbody>
                </table>
                <div class="items-actions">
                    <button class="btn-add-item" onclick="addItem()">+ Add Item</button>
                    <button class="btn-clear-items" type="button" onclick="clearItemData()">Clear Quantities</button>
                </div>
            </div>

            <!-- Totals Section -->
            <div class="totals-section">
                <div class="totals-table">
                    <div class="totals-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="totals-row grand-total">
                        <span>TOTAL:</span>
                        <span id="total">$0.00</span>
                    </div>
                    <div class="totals-lines" aria-hidden="true">
                        <span></span>
                        <span></span>
                    </div>
                </div>
                <div class="notes-section">
                    <label class="form-label" for="invoiceNotes">Notes</label>
                    <textarea id="invoiceNotes" placeholder="Notes..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- New invoice dropdown (shared across all contexts) -->
    <div class="new-invoice-dropdown" id="newInvoiceDropdown">
        <button class="dropdown-item dropdown-blank" onclick="startBlankInvoice()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#5f6368" style="flex-shrink:0"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            Blank Invoice
        </button>
        <div id="templateDropdownList"></div>
    </div>

    <!-- Profile picker -->
    <div class="profile-picker" id="profilePicker">
        <div class="profile-picker-content">
            <div class="logo" style="margin-bottom:24px;display:inline-block">
                <span class="dc">DC</span><br>
                <span class="cable">CABLE</span><br>
                <div class="contractor-text">AUTHORIZED CONTRACTOR</div>
            </div>
            <h2 class="profile-picker-title">Who's using the app?</h2>
            <div class="profile-list" id="profileList"></div>
            <div class="profile-create" id="profileCreate">
                <input type="text" id="newProfileName" placeholder="Enter your name" autocomplete="off"
                    onkeydown="if(event.key==='Enter')submitNewProfile()">
                <button type="button" onclick="submitNewProfile()">Continue →</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
